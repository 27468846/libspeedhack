name: Build Android arm64 libspeedhack.so
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cross-compiler
        run: |
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu make

      - name: Build for Android arm64
        run: |
          make clean
          # 交叉编译为 Android arm64 共享库
          CC=aarch64-linux-gnu-gcc \
          CFLAGS="-fPIC -shared -O2 -DANDROID" \
          LDFLAGS="-Wl,-soname,libspeedhack.so" \
          make

      - name: Package artifact
        run: |
          mkdir -p output
          cp libspeedhack.so output/libspeedhack-android-arm64.so
          zip -r libspeedhack-android-arm64.zip output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libspeedhack-android-arm64
          path: libspeedhack-android-arm64.zip
